<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Split Control</title>
<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
}

.background{
    position:fixed;
    inset:0;
    background:url("zurag.png") no-repeat center center;
    background-size:cover;
}

.middleBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    background:transparent;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.overlay.active{
    opacity:1;
    pointer-events:all;
}

.popup{
    position:absolute;
    inset:0;
    transition:transform 0.25s cubic-bezier(.22,.61,.36,1);
    touch-action:none;
}

.popBg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Fullscreen Flip */
.flip-card{
    position:absolute;
    inset:0;
    perspective:1000px;
}

.flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform 0.6s;
    transform-style:preserve-3d;
}

.flip-inner.flipped{
    transform:rotateY(180deg);
}

.flip-front,
.flip-back{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
}

.flip-front img,
.flip-back img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.flip-back{
    transform:rotateY(180deg);
}
</style>
</head>
<body>

<div class="background"></div>
<div class="middleBtn" onclick="openPopup()"></div>

<div class="overlay" id="overlay">
    <div class="popup" id="popup">
        <img src="pop.png" class="popBg">

        <div class="flip-card">
            <div class="flip-inner" id="flipCard">
                <div class="flip-front">
                    <img src="Untitled30_20260526004749.png">
                </div>
                <div class="flip-back">
                    <img src="2face.png">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const popup = document.getElementById("popup");
const flipCard = document.getElementById("flipCard");

let startY = 0;
let currentY = 0;
let dragging = false;

function openPopup(){
    overlay.classList.add("active");
    popup.style.transform = "translateY(0)";
    flipCard.classList.remove("flipped");
}

/* === TAP CONTROL SPLIT === */
popup.addEventListener("click",(e)=>{
    const clickY = e.clientY;
    const middle = window.innerHeight / 2;

    if(clickY < middle){
        closePopup();
    } else {
        flipCard.classList.toggle("flipped");
    }
});

function closePopup(){
    popup.style.transform = "translateY(100%)";
    setTimeout(()=>{
        overlay.classList.remove("active");
        popup.style.transform = "translateY(0)";
    },300);
}

/* === DRAG TO CLOSE (smooth & elastic) === */
popup.addEventListener("touchstart",(e)=>{
    startY = e.touches[0].clientY;
    dragging = true;
});

popup.addEventListener("touchmove",(e)=>{
    if(!dragging) return;

    const move = e.touches[0].clientY - startY;

    if(move > 0){
        // Хөнгөн drag
        const speedMultiplier = 1.2;
        const elastic = move * 0.15;
        currentY = (move * speedMultiplier) - elastic;

        popup.style.transform = `translateY(${currentY}px)`;
    }
});

popup.addEventListener("touchend",()=>{
    dragging = false;

    if(currentY > 150){
        closePopup();
    } else {
        popup.style.transform = "translateY(0)";
    }

    currentY = 0;
});
</script>

</body>
</html>
